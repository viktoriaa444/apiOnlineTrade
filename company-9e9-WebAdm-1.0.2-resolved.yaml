  /unregister/{object}/{messageNumber}:
    patch:
      tags:
      - object
      summary: подтверждение загрузки данных
      description: Отмена регистрации изменений
      operationId: unregisterPatch
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: ADM
      - name: object
        in: path
        description: "Объект, регистрацию изменений которого необходимо очистить"
        required: true
        schema:
          type: string
        example: units
      - name: messageNumber
        in: path
        description: Номер сообщения
        required: true
        schema:
          type: string
        example: "15"
      responses:
        "200":
          description: Подтверждение успешно получено
        "204":
          description: Не найдены изменения по данным условиям
        "401":
          description: Неавторизованный доступ
        "400":
          description: Не задан/задан не верно параметр
        "500":
          description: Не обработанная ошибка

components:
  schemas:
    externalCode:
      type: string
      description: идентификатор элемента
      example: a0100001-5b97-4e18-9d1c-000000000001
    deleted:
      type: array
      description: идентификаторы удаленных/помеченных на удаление элементов
      items:
        $ref: "#/components/schemas/externalCode"
    unit:
      required:
      - externalCode
      - shortName
      type: object
      properties:
        shortName:
          type: string
          example: гр.
        fullName:
          type: string
          example: Грамм
        externalCode:
          $ref: "#/components/schemas/externalCode"
    units:
      required:
      - deleted
      - units
      type: object
      properties:
        units:
          type: array
          items:
            $ref: "#/components/schemas/unit"
        deleted:
          $ref: "#/components/schemas/deleted"
    property:
      required:
      - externalCode
      - name
      - type
      type: object
      properties:
        externalCode:
          $ref: "#/components/schemas/externalCode"
        type:
          type: string
          example: list
        name:
          type: string
          example: Лейблы
        options:
          type: array
          items:
            $ref: "#/components/schemas/property_options"
    properties:
      required:
      - deleted
      - properties
      type: object
      properties:
        properties:
          type: array
          items:
            $ref: "#/components/schemas/property"
        deleted:
          $ref: "#/components/schemas/deleted"
    storage:
      required:
      - allowOrdering
      - city
      - externalCode
      - isDefault
      - name
      - priceTypes
      - schedule
      type: object
      properties:
        externalCode:
          $ref: "#/components/schemas/externalCode"
        name:
          type: string
          example: "Дом Еды № 4 пр.Мира, 1а"
        address:
          type: string
          example: "пр.Мира, 1а"
        city:
          type: string
          example: Кострома
        allowOrdering:
          type: boolean
          example: true
        isDefault:
          type: boolean
          example: false
        schedule:
          type: string
          example: с 09:00 по 22:01
        priceTypes:
          type: array
          items:
            $ref: "#/components/schemas/storage_priceTypes"
    storages:
      required:
      - deleted
      - storages
      type: object
      properties:
        storages:
          type: array
          items:
            $ref: "#/components/schemas/storage"
        deleted:
          $ref: "#/components/schemas/deleted"
    price:
      required:
      - externalCode
      - prices
      type: object
      properties:
        externalCode:
          $ref: "#/components/schemas/externalCode"
        prices:
          type: array
          items:
            $ref: "#/components/schemas/price_prices"
    productsPrices:
      required:
      - productsPrices
      type: object
      properties:
        productsPrices:
          type: array
          items:
            $ref: "#/components/schemas/price"
    product:
      required:
      - article
      - barcode
      - categories
      - description
      - externalCode
      - name
      - properties
      - unitExternalCode
      type: object
      properties:
        externalCode:
          $ref: "#/components/schemas/externalCode"
        name:
          type: string
          example: Гренки Фишка 120гр Английского бекона
        article:
          type: string
        description:
          type: string
        unitExternalCode:
          $ref: "#/components/schemas/externalCode"
        barcode:
          type: string
          example: "4620757014356"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/externalCode"
        properties:
          type: array
          items:
            $ref: "#/components/schemas/product_properties"
    products:
      required:
      - deleted
      - products
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/product"
        deleted:
          $ref: "#/components/schemas/deleted"
    rest:
      required:
      - externalCode
      - storages
      type: object
      properties:
        externalCode:
          $ref: "#/components/schemas/externalCode"
        storages:
          type: array
          items:
            $ref: "#/components/schemas/rest_storages"
    rests:
      required:
      - rests
      type: object
      properties:
        rests:
          type: array
          items:
            $ref: "#/components/schemas/rest"
    group:
      required:
      - externalCode
      - name
      type: object
      properties:
        externalCode:
          $ref: "#/components/schemas/externalCode"
        name:
          type: string
          example: Зоотовары
        groups:
          type: array
          items:
            $ref: "#/components/schemas/group_groups"
    groups:
      required:
      - deleted
      - groups
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/group"
        deleted:
          $ref: "#/components/schemas/deleted"
    categoryProperty:
      required:
      - categories
      - externalCode
      type: object
      properties:
        externalCode:
          $ref: "#/components/schemas/externalCode"
        categories:
          $ref: "#/components/schemas/categoryProperty_categories"
    categoryProperties:
      required:
      - categoryProperties
      type: object
      properties:
        categoryProperties:
          type: array
          items:
            $ref: "#/components/schemas/categoryProperty"
    photo:
      required:
      - externalCode
      - medias
      type: object
      properties:
        externalCode:
          $ref: "#/components/schemas/externalCode"
        medias:
          type: array
          items:
            $ref: "#/components/schemas/photo_pictures"
    photos:
      required:
      - media
      type: object
      properties:
        media:
          type: array
          items:
            $ref: "#/components/schemas/photo"
    general:
      type: object
      properties:
        unitsGr:
          $ref: "#/components/schemas/units"
        propertiesGr:
          $ref: "#/components/schemas/properties"
        storagesGr:
          $ref: "#/components/schemas/storages"
        productsGr:
          $ref: "#/components/schemas/products"
        groupsGr:
          $ref: "#/components/schemas/groups"
        categoryPropertiesGr:
          $ref: "#/components/schemas/categoryProperties"
        mediaGr:
          $ref: "#/components/schemas/photos"
        productsPricesGr:
          $ref: "#/components/schemas/productsPrices"
        restsGr:
          $ref: "#/components/schemas/rests"
    order:
      required:
      - externalCode
      - number
      - createdAt
      - storageExternalCode
      - status
      - customer
      - delivery
      - slot
      - replacementPolicy
      - payment
      - items
      - totals
      type: object
      properties:
        externalCode:
          $ref: "#/components/schemas/externalCode"
        number:
          type: string
          example: "11826"
        createdAt:
          type: string
          example: "26.04.2026 20:07:00"
        storageExternalCode:
          $ref: "#/components/schemas/externalCode"
        status:
          type: object
          properties:
            code:
              type: string
              example: "CREATED"
              description: CREATED;ASSEMBLED;WITH_COURIER;READY_FOR_PICKUP;COMPLETED; CANCELLED ;
            title:
              type: string
              example: "Оформлен"  
        customer:
          type: object
          properties:
            firstName:
              type: string
              example: "Матвей" 
            lastName:
              type: string
              example: "Тестовый"  
            phone:
              type: string
              example: "+78005553535"
            email:
              type: string
              example: "test@test.ru"
            loyaltyCardNumber:
              type: string
              example: "20467113"  
        delivery:
          type: object
          properties:
            method:
              type: object
              properties:
                code:
                  type: string
                  example: "COURIER"
                  description: PICKUP;COURIER;
                title:
                  type: string
                  example: "Доставка курьером"   
            address:
              description: может быть null
              type: object
              properties:
                fullAddress: 
                  type: string
                  example: "г. Кострома, улица Юрия Беленогова, 30"
                shortAddress: 
                  type: string
                  example: "ул. Юрия Беленогова, 30"
                latitude: 
                  type: string
                  example: "38.6564"
                longitude: 
                  type: string
                  example: "40.2224"
                apartment: 
                  type: string
                  example: "13"
                  description: квартира
                intercom: 
                  type: string
                  example: "38"
                  description: домофон, может быть null
                floor: 
                  type: number
                  example: 5
                entrance: 
                  type: number
                  example: 1
                isPrivateHouse: 
                  type: boolean
                  example: false  
            slot:
              type: object
              properties:
                date: 
                  type: string
                  example: "2026-04-26"
                from: 
                  type: string
                  example: "18:00"
                to: 
                  type: string
                  example: "19:00"
            comment: 
              type: string
              description: может быть null
              example: "комм" 
            replacementPolicy:
              type: object
              properties:
                code: 
                  type: string
                  example: "REPLACE_NO_CALL"
                  description: CALL_THEN_REPLACE;CALL_THEN_REMOVE ;REPLACE_NO_CALL ;REMOVE_NO_CALL ;
                title:
                  type: string
                  example: "не звоните, замените на аналогичный"  
        payment:
          type: object
          properties:
            method:
              type: object
              properties:
                code:
                  type: string
                  example: "CARD_ONLINE"
                  description: CARD_ON_DELIVERY;CARD_ONLINE;
                title:
                  type: string
                  example: "Оплата онлайн"    
        appliedDiscount:
          type: object
          description: может быть null
          properties:
            type:
                type: string
                example: "promo"
                description: bonuses;promo; 
            code:
                type: string
                example: "NEW200" 
            value:
                type: string
                example: "200" 
            unit:
                type: string
                example: "RUB"
                description: RUB; PERCENT
        items:
          type: array
          items:
            type: object
            properties:
              productExternalCode: 
                $ref: "#/components/schemas/externalCode"
              quantity: 
                type: number
                example: 2
              unitPrice: 
                type: number
                example: 100 
              total: 
                type: number
                example: 200   
        totals:
          type: object
          properties:
            initial: 
                type: number
                example: 200
            discount: 
                type: number
