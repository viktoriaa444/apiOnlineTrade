openapi: 3.0.0
info:
  title: БИЗ - Сайт
  description: Сервис для обмена информацией между базой интернет заказов и сайтом
  contact:
    name: '@freska_04'
  version: 1.0.2
servers:
- url: http://88.86.81.195:8083/IronOnlineTrade/hs/api/v1/
  description: Not dev server  
paths:
  /exchange/general:
    get:
      tags:
      - general
      summary: общий метод выгрузки изменений
      description: Получение изменений справочников и регистров
      operationId: generalGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: АДМ
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/general"
        "204":
          description: Нет изменений
        "401":
          description: Неавторизованный доступ
        "400":
          description: Не задан код магазина / Не найден магазин / Не найден узел обмена
        "500":
          description: Ошибка сервера
  /exchange/units:
    get:
      tags:
      - separately
      summary: единицы измерения
      description: Получение изменений справочника "КлассификаторЕдиницИзмерения"
      operationId: unitsGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: АДМ
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/units"
        "204":
          description: Нет изменений
        "401":
          description: Неавторизованный доступ
        "400":
          description: Не задан код магазина / Не найден магазин / Не найден узел обмена
        "500":
          description: Ошибка сервера
  /exchange/properties:
    get:
      tags:
      - separately
      summary: свойства номенклатуры
      description: "Получение изменений справочников \"Стикеры\", \"ВидПродукта\" и \"АналитическиеПризнакиНоменклатуры\". Элементы признаков типа \"list\" выгружаются лишь измененные"
      operationId: propertiesGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: АДМ
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/properties"
        "204":
          description: Нет изменений
        "401":
          description: Неавторизованный доступ
        "400":
          description: Не задан код магазина / Не найден магазин / Не найден узел обмена
        "500":
          description: Ошибка сервера
  /exchange/storages:
    get:
      tags:
      - separately
      summary: магазины
      description: Получение изменений справочника "Магазины"
      operationId: storagesGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: АДМ
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/storages"
        "204":
          description: Нет изменений
        "401":
          description: Неавторизованный доступ
        "400":
          description: Не задан код магазина / Не найден магазин / Не найден узел обмена
        "500":
          description: Ошибка сервера
  /exchange/prices:
    get:
      tags:
      - separately
      summary: цены товаров
      description: Получение изменений справочника "ЦеныНоменклатуры"
      operationId: pricesGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: АДМ
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/productsPrices"
        "204":
          description: Нет изменений
        "401":
          description: Неавторизованный доступ
        "400":
          description: Не задан код магазина / Не найден магазин / Не найден узел обмена
        "500":
          description: Ошибка сервера
  /exchange/products:
    get:
      tags:
      - separately
      summary: товары
      description: Получение изменений справочника "Номенклатура"
      operationId: productsGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: АДМ
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/products"
        "204":
          description: Нет изменений
        "401":
          description: Неавторизованный доступ
        "400":
          description: Не задан код магазина / Не найден магазин / Не найден узел обмена
        "500":
          description: Ошибка сервера
  /exchange/rests:
    get:
      tags:
      - separately
      summary: остатки товаров
      description: Получение изменений регистра сведений "ОстаткиТоваров"
      operationId: restsGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: АДМ
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rests"
        "204":
          description: Нет изменений
        "401":
          description: Неавторизованный доступ
        "400":
          description: Не задан код магазина / Не найден магазин / Не найден узел обмена
        "500":
          description: Ошибка сервера
  /exchange/groups:
    get:
      tags:
      - separately
      summary: "категории, подкатегории"
      description: Получение изменений справочника "НаборыПризнаковНоменклатуры"
      operationId: groupsGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: АДМ
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/groups"
        "204":
          description: Нет изменений
        "401":
          description: Неавторизованный доступ
        "400":
          description: Не задан код магазина / Не найден магазин / Не найден узел обмена
        "500":
          description: Ошибка сервера
  /exchange/categoryProperties:
    get:
      tags:
      - separately
      summary: виды продуктов
      description: Получение изменений справочника "ПризнакиИнтернетМагазина"
      operationId: gcategoryPropertiesGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: АДМ
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
                type: integer
          content:
