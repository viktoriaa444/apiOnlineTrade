openapi: 3.0.0
info:
  title: БИЗ - Сайт
  description: Сервис для обмена информацией между базой интернет заказов и сайтом
  contact:
    name: '@freska_04'
  version: 1.0.2
servers:
- url: http://88.86.81.195:8083/IronOnlineTrade/hs/api/v1/
  description: Копия базы 
- url: http://88.86.81.195:8083/OnlineTrading/hs/api/v1/
  description: БИЗ
paths:
  /exchange/general:
    get:
      tags:
      - object
      summary: общий метод выгрузки измененных элементов
      description: Получение изменений справочников и регистров
      operationId: generalGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: ADM
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/general"
        "204":
          description: Нет изменений
        "401":
          description: Неавторизованный доступ
        "400":
          description: Не задан код магазина / Не найден магазин / Не найден узел обмена
        "500":
          description: Ошибка сервера
  /order/creature:
    post:
      tags:
      - documents
      summary: создание документа "Заказ покупателя"
      description: Создает заказ на основе переданных в теле параметров
      operationId: orderPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/order"
      responses:
        "200":
          description: Заказ создан
        "401":
          description: Неавторизованный доступ
        "400":
          description: Документ существует / Не определено тело запроса / Не найден УИ заказа
        "500":
          description: Ошибка сервера                
  /exchange/units:
    get:
      tags:
      - not relevant
      summary: единицы измерения
      description: Получение изменений справочника "КлассификаторЕдиницИзмерения"
      operationId: unitsGet
      parameters:
      - name: storeCode
        in: header
        description: "Код ИМ, определяющий источник посылаемого запроса"
        required: true
        schema:
          type: string
        example: АДМ
      responses:
        "200":
          description: Успешный ответ со списком измененных элеменов
          headers:
            messageNumber:
              description: Номер отправленного сообщения обмена
              schema:
