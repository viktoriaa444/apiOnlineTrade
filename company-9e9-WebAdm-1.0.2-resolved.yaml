        "500":
          description: Ошибка сервера
  /exchange/groups:
    get:
      tags:
      - not relevant
      summary: "категории, подкатегории"
      description: Получение изменений справочника "НаборыПризнаковНоменклатуры"
      operationId: groupsGet
      parameters:
      - name: storeCode
        in: header
